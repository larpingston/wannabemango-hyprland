#
#  hyprlock.conf — minimal · dark · translucent
#

general {
    hide_cursor = true
    no_fade_in = true
    no_fade_out = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

source = $HOME/.cache/wal/colors-hyprland


# ── Background ───────────────────────────────────────────────────────────────

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    brightness = 0.45
    contrast = 0.85
    vibrancy = 0.10
    vibrancy_darkness = 0.0
}


# ── Time ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.88)
    font_size = 112
    font_family = Adwaita Sans Thin
    position = 0, 140
    halign = center
    valign = center
}


# ── Input Field ──────────────────────────────────────────────────────────────

input-field {
    monitor =
    size = 280, 44
    outline_thickness = 0
    dots_size = 0.20
    dots_spacing = 0.80
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(255, 255, 255, 0.75)

    check_color = rgba(0, 0, 0, 0)
    fail_color = rgba(255, 80, 80, 0.60)
    fail_text = incorrect
    fail_transition = 0

    capslock_color = rgba(230, 180, 60, 0.65)
    numlock_color = -1

    fade_on_empty = false
    placeholder_text =

    rounding = 0
    shadow_passes = 0

    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}
